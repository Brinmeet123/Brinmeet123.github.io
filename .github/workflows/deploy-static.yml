# This app uses NextAuth, API routes, Prisma, and middleware — it cannot be exported as a
# static site (NEXT_OUTPUT=export). Use Vercel, Docker, or another Node host instead.
# Kept as manual-only so pushes to main do not fail CI.

name: Deploy Static Site (disabled — server runtime required)

on:
  workflow_dispatch:

jobs:
  explain:
    name: Not supported for this codebase
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: |
          echo "This workflow previously built a static export for GitHub Pages."
          echo "The current app requires a server (auth, database, API routes)."
          echo "Use .github/workflows/deploy-vercel.yml, docker-build.yml, or host the Docker image."
          exit 0
